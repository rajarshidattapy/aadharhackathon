services:
  - type: web
    name: aadhar-backend
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: AADHAAR_DATA_FILE
        value: "hf://datasets/mrmarvelous/aadharclean/merged_aadhaar_data_sample.csv"
      - key: AADHAAR_MERGED_CSV
        value: "hf://datasets/mrmarvelous/aadharclean/merged_aadhaar_data_sample.csv"

